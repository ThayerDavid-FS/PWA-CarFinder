<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New ES6/SCSS Project</title>
</head>
<body>
  <section class="hero">
    <div class="container">
      <header>
        <h1 class="title">Find Your Dream Vehicle</h1>
        <p class="subtitle">Have you been dreaming about getting a new vehicle? <br>Look no further!</p>
      </header>

      <form class="search-box" id="vehicleForm">
        
        <div class="columns">
          <h2 class="heading" id="yearHeading">Year</h2>
          <div>          
          <select name="year" id="yearSelect" class="selected">
            <option value="">Select Year</option>
          </select>
          </div>
        </div>

        <div class="columns">
          <h2 class="heading" id="makeHeading">Make</h2>
          <select name="make" id="makeSelect" disabled>
            <option value="">Select Make</option>
          </select>
        </div>

        <div class="columns">
          <h2 class="heading" id="modelHeading">Model</h2>
          <select name="model" id="modelSelect" disabled>
            <option value="">Select Model</option>
          </select>
        </div>
      </form>
      
    </div>
  </section>
  <script src="bundle.js"></script>
</body>
</html>
