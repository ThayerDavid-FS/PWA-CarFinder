<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New ES6/SCSS Project</title>
</head>
<body>
  <section class="hero">
    <div></div>
      <header>
        <h1>Find Your Dream Vehicle</h1>
        <p>Have you been dreaming about getting a new vehicle? <br>Look no further!</p>
      </header>

      <form class="vehicle-search" id="vehicleForm">
        <div class="form-group">
          <label for="yearSelect">Year</label>
          <select name="year" id="yearSelect">
            <option value="">Select Year</option>
          </select>
        </div>

        <div class="form-group">
          <label for="makeSelect">Make</label>
          <select name="make" id="makeSelect">
            <option value="">Select Make</option>
          </select>
        </div>

        <div class="form-group">
          <label for="modelSelect">Model</label>
          <select name="model" id="modelSelect">
            <option value="">Select Model</option>
          </select>
        </div>
      </form>
      
    </div>
  </section>
  <script src="bundle.js"></script>
</body>
</html>
